# Usage:
#   ./scripts/macos-network.sh status balanced-ethernet
#   ./scripts/macos-network.sh use balanced-ethernet
#   ./scripts/macos-network.sh --dry-run apply balanced-ethernet
#   ./scripts/macos-network.sh apply balanced-ethernet
# Assumes a 1500-byte MTU path on Ethernet/Wi-Fi with working PMTUD.
# If you spend most of your time on VPN/tunnels, start from apple-default.
kern.ipc.maxsockbuf=16777216
net.inet.tcp.autorcvbufmax=16777216
net.inet.tcp.delayed_ack=0
net.inet.tcp.mssdflt=1460
net.inet.tcp.recvspace=262144
net.inet.tcp.sendspace=262144
net.inet.tcp.win_scale_factor=8
